<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" fill="none" role="img" aria-label="وضوح">
  <style><![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap');
    .wm { font-family: 'Cairo', 'Tajawal', sans-serif; font-weight: 900; }
  ]]></style>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1ec9b8"/>
      <stop offset="0.55" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#0a766b"/>
    </linearGradient>
    <radialGradient id="hl" cx="0.3" cy="0.2" r="0.75">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#04413b" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd27a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
  </defs>

  <!-- badge with depth -->
  <rect x="10" y="10" width="200" height="200" rx="52" fill="url(#bg)"/>
  <rect x="10" y="10" width="200" height="200" rx="52" fill="url(#shade)"/>
  <rect x="10" y="10" width="200" height="200" rx="52" fill="url(#hl)"/>
  <rect x="12.5" y="12.5" width="195" height="195" rx="49.5" fill="none"
        stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>

  <!-- faint document motif behind the name -->
  <rect x="70" y="46" width="80" height="108" rx="13" fill="#ffffff" fill-opacity="0.06"/>
  <rect x="70" y="46" width="80" height="108" rx="13" fill="none"
        stroke="#ffffff" stroke-opacity="0.2" stroke-width="3"/>
  <path d="M134 46l16 16h-10a6 6 0 0 1-6-6z" fill="#ffffff" fill-opacity="0.2"/>

  <!-- amber spark with glow + accent sparkles -->
  <circle cx="158" cy="56" r="13" fill="#f9b233" opacity="0.55" filter="url(#glow)"/>
  <path d="M158 44c1.2 6 2.4 7.4 8.4 8.6-6 1.2-7.2 2.6-8.4 8.6-1.2-6-2.4-7.4-8.4-8.6 6-1.2 7.2-2.6 8.4-8.6z" fill="#f9b233"/>
  <circle cx="140" cy="40" r="2.4" fill="#ffffff" opacity="0.85"/>
  <circle cx="172" cy="72" r="2" fill="#ffe3a6"/>

  <!-- wordmark with soft shadow -->
  <text class="wm" x="110" y="134" font-size="62" fill="#04413b" fill-opacity="0.25"
        text-anchor="middle" direction="rtl">وضوح</text>
  <text class="wm" x="110" y="132" font-size="62" fill="#ffffff"
        text-anchor="middle" direction="rtl">وضوح</text>

  <!-- accent underline -->
  <rect x="82" y="151" width="56" height="6" rx="3" fill="url(#amber)"/>
</svg>
